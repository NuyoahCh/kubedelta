# 模拟 OMS：通过 ConfigMap 下发策略，Pod 通过 envFrom 读取。
apiVersion: v1
kind: ConfigMap
metadata:
  name: oms-policy
  namespace: kubedelta-system
data:
  OMS_DECISION: "allow"
  OMS_REQUIRED_LABEL: "nodepool.kubedelta.io/name"
  OMS_NOTE: "暂不需要额外拉取，核心信息来自 OMS 中框（本地用 ConfigMap 模拟）"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oms-consumer
  namespace: kubedelta-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oms-consumer
  template:
    metadata:
      labels:
        app: mock-oms-consumer
    spec:
      schedulerName: kubedelta-scheduler
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "env | grep OMS; sleep 3600"]
          envFrom:
            - configMapRef:
                name: oms-policy
