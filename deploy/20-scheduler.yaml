apiVersion: v1
kind: Service
metadata:
  name: kubedelta-extender
  namespace: kube-system
spec:
  selector:
    app: kubedelta-extender
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedelta-extender
  namespace: kube-system
  labels:
    app: kubedelta-extender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubedelta-extender
  template:
    metadata:
      labels:
        app: kubedelta-extender
    spec:
      serviceAccountName: kubedelta-scheduler
      containers:
        - name: extender
          image: kubedelta-extender:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubedelta-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceNamespace: kube-system
      resourceName: kubedelta-scheduler
    profiles:
      - schedulerName: kubedelta-scheduler
        extenders:
          - urlPrefix: "http://kubedelta-extender.kube-system.svc:8080"
            filterVerb: filter
            prioritizeVerb: prioritize
            weight: 5
            nodeCacheCapable: false
            managedResources: []
            ignorable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedelta-scheduler
  namespace: kube-system
  labels:
    app: kubedelta-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubedelta-scheduler
  template:
    metadata:
      labels:
        app: kubedelta-scheduler
    spec:
      serviceAccountName: kubedelta-scheduler
      priorityClassName: system-cluster-critical
      containers:
        - name: kube-scheduler
          image: registry.k8s.io/kube-scheduler:v1.31.4
          imagePullPolicy: IfNotPresent
          command:
            - kube-scheduler
          args:
            - --config=/etc/kubernetes/kubedelta/scheduler-config.yaml
            - --v=3
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes/kubedelta
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
      volumes:
        - name: config
          configMap:
            name: kubedelta-scheduler-config
